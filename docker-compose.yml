services:
  postgres:
    image: postgres:16-alpine
    container_name: knowpilot-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: knowpilot
      POSTGRES_PASSWORD: knowpilot
      POSTGRES_DB: knowpilot
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
