# KnowPilot 运行时配置（本地优先，教学/产品向）
# 环境变量仍可覆盖敏感项与部署相关项；此处放与业务行为相关的可调参数。

# LLM 弹性调用（错误分类 + 指数退避重试 + fallback 降级）
llm:
  # 全局默认模型 id（Agent/会话未指定模型时生效）；env DEFAULT_LLM_MODEL 可覆盖，缺省回退内置常量
  defaultModel: deepseek-v4-flash
  # 同一模型失败重试次数（指数退避 + jitter；429/5xx/网络抖动可重试，401/400 直接失败）
  maxRetries: 3
  # 退避基数（毫秒）；实际等待 = baseDelayMs × 2^attempt × jitter
  baseDelayMs: 1000
  # 重试耗尽后按序降级的备用模型（provider 由模型名自动推导，需对应厂商已配置 API Key）
  # 例：fallbackModels: ["kimi-k2", "glm-4-flash"]
  fallbackModels: []

stream:
  # 每个运行中 session 的内存环形缓冲事件数（热缓冲，用于低延迟推送）
  ringSize: 500
  # 是否将事件持久化到 SQLite（服务端重启后可按 sessionId 续传）
  persist: true
  # 持久化事件保留时长（毫秒），超过后由定时清理任务删除
  eventTtlMs: 300000
  # 过期事件清理间隔（毫秒）
  cleanupIntervalMs: 60000
  # Steering：工具批结束后注入；one-at-a-time | all
  steeringMode: one-at-a-time
  # Follow-up：本会停止时注入续轮；one-at-a-time | all
  followUpMode: one-at-a-time

# 长对话自动压缩（Auto-Compact）
compact:
  enabled: true
  # 占模型 context window 的触发比例（0.1–0.95）；默认 75% 时 macro 摘要
  triggerRatio: 0.75
  # 压缩后保留的最近消息条数
  keepRecent: 8
  # 摘要专用模型（与主对话解耦，避免用付费主模型烧钱压缩）
  # auto = 优先 OpenRouter :free → freellm 网关模型 → 回退主对话模型；也可写死具体 id
  summaryModel: auto
  # micro-compact：先清超大 tool result，延缓触顶（学 Claude Code）
  microCompact:
    enabled: true
    toolResultMaxChars: 4000
  # memory flush：macro 摘要前静默提取事实写入 Memory（学 OpenClaw）
  memoryFlush:
    enabled: true
    maxFacts: 5

# ══ 全局任务池（v8 TP-1/TP-2；实现：apps/server/src/infra/asyncJobOrchestrator.ts）══
# 池目标：全局并发上限的单一事实源 + 公平排队 + 永不丢任务。
#   · 单一事实源：maxConcurrent 是全系统后台 LLM 并发的唯一容量权威（Q1 全局单池）；
#     per-session / per-workspace 只是池内公平配额维度，不是容量权威。
#   · 公平排队：准入判定链 global → session → workspace，首个命中的上限即排队原因；
#     queued 记录 reason + position，右栏「进行中」组展示「第 N 位 · 因 X 上限排队」。
#   · 永不丢任务：消费续跑未获槽则原样留待下次触发（CLAIM 移到获槽后），拒绝等槽无限挂起。
# 入池 = 交付优先的异步执行（async_task_run / spawn 跟踪任务 / heartbeat / trigger 等共享）；
# 不入池 = 交互式运行（用户直发消息走 hub 即时起流零排队，但计入全局占用，Q2）。
# 槽位类别：llm（默认，占 maxConcurrent）/ lightweight（sleep、async_task_run mode=tool，不占 LLM 槽）。
# 注意：池只控制并发调度（queued → running）；是否「异步投递」由工具的 waitForResult 决定。
# 环境变量 AGENT_ASYNC_* 可覆盖下列默认值。
asyncJobs:
  # 全局同时 running 上限（所有 session 共享）——仅约束 slotClass=llm 的后台推理/子 Agent。
  # 口径：全局占用 = 池内 llm running + hub 交互 running（用户聊天流不打标计入池，但占用全局容量）
  maxConcurrent: 2
  # 单 session 同时 running 上限
  maxPerSession: 2
  # per-workspace 公平配额（0 = 不限；公平策略不是容量权威，全局池才是）
  # env AGENT_ASYNC_MAX_PER_WORKSPACE 可覆盖
  maxPerWorkspace: 0
  # 排队总数上限，满则入池拒绝，调用方（LLM 工具/UI）收到「队列已满，请稍后再派」明确错误
  # env AGENT_ASYNC_MAX_QUEUED 可覆盖
  maxQueued: 100
  # 单任务执行超时（毫秒）
  taskTimeoutMs: 300000
  # 排队超时（毫秒）；0 = 不限制
  queuedTimeoutMs: 0
  # 失败重试次数
  maxRetries: 3
  # 每个父会话允许的 subagent 数量上限
  maxSubagentsPerSession: 10

# W7 反思（默认关闭）：loop 进入 done 前用 criticModel 对终稿做一票结构化 critic（JSON: passed/issues）；
# 不通过则把意见作为 user 消息经 injectUserMessages 回注，loop 重修一轮；
# 轮数耗尽则带 [未经反思通过] 标记放行（不阻断用户）；critic 失败 = 静默跳过。
reflection:
  enabled: false
  # 最大反思重修轮数；0 = 只审不修（不通过直接标记放行）
  maxRounds: 1
  # critic 使用的便宜模型（空 = 与主 Agent 模型相同）
  criticModel: ""

# Hermes Skill 闭环（主仓 Closed Learning Loop）
skills:
  # 本轮 tool 调用次数 ≥ 此值 → 回合后 background skill review；0 = 关闭
  nudgeInterval: 10
  # 审查旁路模型（对标 Hermes auxiliary.background_review）
  # auto = OpenRouter 已同步 :free 目录里按 strong_free 打分挑「最强免费」；也可钉死如 google/gemma-3-27b-it:free
  reviewModel: auto
  # curator：闲置 N 天标 stale / 再闲置归档到 content/skills/.archive（非硬删）
  staleAfterDays: 30
  archiveAfterDays: 90
  # curator 最小运行间隔（小时）；默认 7 天
  curatorIntervalHours: 168

# Chat Goal / Deep Research 外环（Hermes Ralph 环）
goal:
  maxTurns: 20
  deepResearchMaxTurns: 30
  # 裁判模型；auto = OpenRouter strong_free
  judgeModel: auto

# W3：审批 decision-scope / gate 通知冷却（per-Approval.lastNotifiedAt）
approvalGate:
  # 同一审批冷却窗口内不重复通知（毫秒）；默认 30min
  notifyCooldownMs: 1800000

# 超级 Agent 心跳 Loop Contract（控制平面；不替换 ReAct）
heartbeat:
  # W2 决策层：cron 只负责唤醒；decisionEnabled=false 可整体回退到旧「到点即跑」
  decisionEnabled: true
  # quiet/monitor_quiet_skip 退避 skipTicks 上限（1→3→7→cap）
  quietCap: 8
  # 连续 K 次 quiet（无 gate/队列）→ terminal_no_followup，复用 heartbeatSuspendedAt
  terminalAfterQuiet: 3
  # wait_user_gate 同 gate 通知冷却（毫秒）
  gateNotifyCooldownMs: 1800000
  loopContract:
    # 连续 N 轮无新 evidence → handoff=false，跳过后续触发直至 resume
    maxStaleRounds: 3
    # evidence 环形保留条数
    maxEvidence: 50
