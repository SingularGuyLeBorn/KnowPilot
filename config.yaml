# KnowPilot 运行时配置（本地优先，教学/产品向）
# 环境变量仍可覆盖敏感项与部署相关项；此处放与业务行为相关的可调参数。

# LLM 弹性调用（错误分类 + 指数退避重试 + fallback 降级）
llm:
  # 全局默认模型 id（Agent/会话未指定模型时生效）；env DEFAULT_LLM_MODEL 可覆盖，缺省回退内置常量
  defaultModel: deepseek-v4-flash
  # 同一模型失败重试次数（指数退避 + jitter；429/5xx/网络抖动可重试，401/400 直接失败）
  maxRetries: 3
  # 退避基数（毫秒）；实际等待 = baseDelayMs × 2^attempt × jitter
  baseDelayMs: 1000
  # 重试耗尽后按序降级的备用模型（provider 由模型名自动推导，需对应厂商已配置 API Key）
  # 例：fallbackModels: ["kimi-k2", "glm-4-flash"]
  fallbackModels: []

stream:
  # 每个运行中 session 的内存环形缓冲事件数（热缓冲，用于低延迟推送）
  ringSize: 500
  # 是否将事件持久化到 SQLite（服务端重启后可按 sessionId 续传）
  persist: true
  # 持久化事件保留时长（毫秒），超过后由定时清理任务删除
  eventTtlMs: 300000
  # 过期事件清理间隔（毫秒）
  cleanupIntervalMs: 60000
  # Steering：工具批结束后注入；one-at-a-time | all
  steeringMode: one-at-a-time
  # Follow-up：本会停止时注入续轮；one-at-a-time | all
  followUpMode: one-at-a-time

# 长对话自动压缩（Auto-Compact）
compact:
  enabled: true
  # 占模型 context window 的触发比例（0.1–0.95）；默认 75% 时 macro 摘要
  triggerRatio: 0.75
  # 压缩后保留的最近消息条数
  keepRecent: 8
  # micro-compact：先清超大 tool result，延缓触顶（学 Claude Code）
  microCompact:
    enabled: true
    toolResultMaxChars: 4000
  # memory flush：macro 摘要前静默提取事实写入 Memory（学 OpenClaw）
  memoryFlush:
    enabled: true
    maxFacts: 5
  # 已废弃：仅文档参考；实际阈值 = triggerRatio × 模型 context window
  charThreshold: 48000

# 后台任务池（async_task_run / spawn 跟踪任务等共享）
# 注意：池只控制并发调度（queued → running）；是否「异步投递」由工具的 waitForResult 决定。
# 环境变量 AGENT_ASYNC_* 可覆盖下列默认值。
asyncJobs:
  # 全局同时 running 上限（所有 session 共享）
  maxConcurrent: 2
  # 单 session 同时 running 上限
  maxPerSession: 2
  # 单任务执行超时（毫秒）
  taskTimeoutMs: 300000
  # 排队超时（毫秒）；0 = 不限制
  queuedTimeoutMs: 0
  # 失败重试次数
  maxRetries: 3
  # 每个父会话允许的 subagent 数量上限
  maxSubagentsPerSession: 10

# W7 反思（默认关闭）：loop 进入 done 前用 criticModel 对终稿做一票结构化 critic（JSON: passed/issues）；
# 不通过则把意见作为 user 消息经 injectUserMessages 回注，loop 重修一轮；
# 轮数耗尽则带 [未经反思通过] 标记放行（不阻断用户）；critic 失败 = 静默跳过。
reflection:
  enabled: false
  # 最大反思重修轮数；0 = 只审不修（不通过直接标记放行）
  maxRounds: 1
  # critic 使用的便宜模型（空 = 与主 Agent 模型相同）
  criticModel: ""

# 超级 Agent 心跳 Loop Contract（控制平面；不替换 ReAct）
heartbeat:
  loopContract:
    # 连续 N 轮无新 evidence → handoff=false，跳过后续触发直至 resume
    maxStaleRounds: 3
    # evidence 环形保留条数
    maxEvidence: 50
