<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f6f3"/>
      <stop offset="100%" stop-color="#f0ede8"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="60%" r="50%">
      <stop offset="0%" stop-color="rgba(184,160,144,0.25)"/>
      <stop offset="100%" stop-color="rgba(184,160,144,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="160" fill="url(#glow)"/>

  <!-- Star field -->
  <g fill="#a89080" opacity="0.6">
    <circle cx="120" cy="80" r="2"/>
    <circle cx="240" cy="140" r="1.5"/>
    <circle cx="180" cy="280" r="2.5"/>
    <circle cx="360" cy="60" r="1.5"/>
    <circle cx="420" cy="320" r="2"/>
    <circle cx="540" cy="100" r="1.5"/>
    <circle cx="660" cy="260" r="2"/>
    <circle cx="780" cy="50" r="1.5"/>
    <circle cx="1020" cy="120" r="2"/>
    <circle cx="1080" cy="300" r="1.5"/>
    <circle cx="1140" cy="180" r="2"/>
  </g>

  <!-- Wireframe planet -->
  <g transform="translate(900, 200)" opacity="0.35" stroke="#b8a090" stroke-width="1" fill="none">
    <circle cx="0" cy="0" r="120"/>
    <ellipse cx="0" cy="0" rx="120" ry="40"/>
    <ellipse cx="0" cy="0" rx="120" ry="80"/>
    <line x1="-120" y1="0" x2="120" y2="0"/>
    <line x1="0" y1="-120" x2="0" y2="120"/>
    <line x1="-85" y1="-85" x2="85" y2="85"/>
    <line x1="-85" y1="85" x2="85" y2="-85"/>
  </g>

  <!-- Text -->
  <text x="120" y="170" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#2d2a26">KnowPilot</text>
  <text x="120" y="220" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#6a6560">Agentic Knowledge OS — 你的本地优先知识工作台</text>
  <text x="120" y="270" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" fill="#9a9588">Next.js 16 · React 19 · tRPC 11 · Prisma · SQLite · Tailwind CSS v4</text>
</svg>
